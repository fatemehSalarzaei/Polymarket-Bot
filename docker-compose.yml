services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polymarket_bot
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://polymarket:polymarket@postgres:5432/polymarket_bot
      REDIS_URL: redis://redis:6379/0
      TRADING_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://polymarket:polymarket@postgres:5432/polymarket_bot
      REDIS_URL: redis://redis:6379/0
      TRADING_ENABLED: "false"
      REAL_ORDER_DRY_RUN: "true"
    command: celery -A app.celery_app.celery_app worker --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://polymarket:polymarket@postgres:5432/polymarket_bot
      REDIS_URL: redis://redis:6379/0
      TRADING_ENABLED: "false"
      REAL_ORDER_DRY_RUN: "true"
    command: celery -A app.celery_app.celery_app beat --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  realtime_runner:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://polymarket:polymarket@postgres:5432/polymarket_bot
      REDIS_URL: redis://redis:6379/0
      TRADING_ENABLED: "false"
      REAL_ORDER_DRY_RUN: "true"
    command: python -m app.workers.realtime_runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/dashboard
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
